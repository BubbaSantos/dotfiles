# Application bindings
$terminal = uwsm-app -- ghostty
$browser = omarchy-launch-browser
$webapp = chromium --app

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"


# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

#unbinds
unbind = SUPER, A
unbind = SUPER, W
unbind = SUPER, F
unbind = SUPER, J
unbind = SUPER, P
unbind = SUPER, O
unbind = SUPER CTRL, F
unbind = SUPER ALT, F
unbind = SUPER, TAB
unbind = SUPER CTRL, TAB
unbind = , PRINT
unbind = SHIFT, PRINT
unbind = SUPER, T
unbind = SUPER CTRL, T
unbind = SUPER CTRL, B
unbind = SUPER, Y
unbind = SUPER, K
unbind = SUPER, \
unbind = SUPER, Z
unbindd = SUPER CTRL, SPACE
unbindd = SUPER CTRL, V


#Apps
bindd = SUPER, A, Claude, exec, $webapp="https://claude.ai/new"
#bindd = SUPER, A, Claude, exec, firefoxpwa site launch 01KGTGYTMPGTYGVTXRQ9ART9SH
#bindd = SUPER, B, Zen, exec, zen-browser
bindd = SUPER, B, Browser, exec, vivaldi --ozone-platform-hint=auto --enable-features=TouchpadOverscrollHistoryNavigation
bindd = SUPER, Z, ChatGPT, exec, $webapp="https://chatgpt.com"
bindd = SUPER, L, Editor, exec, omarchy-launch-editor
bind = SUPER SHIFT, L, exec, localsend
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window
bind = SUPER, N, exec, ~/.config/hypr/scripts/toggle-notion.sh
bind = SUPER, O, exec, ~/.config/hypr/scripts/toggle-outlook.sh
bind = SUPER, M, exec, ~/.config/hypr/scripts/toggle-ytmusic.sh
bind = SUPER, F, exec, ~/.config/hypr/scripts/toggle-fotmob.sh
bind = SUPER, R, exec, ~/.config/hypr/scripts/toggle-reddit.sh
bind = SUPER SHIFT, R, exec, ~/.config/hypr/scripts/toggle-remmina.sh
bind = SUPER, T, exec, ~/.config/hypr/scripts/toggle-teams-linux.sh
bind = SUPER, P, exec, ~/.config/hypr/scripts/midas-log
bind = SUPER, Y, exec, ~/.config/hypr/scripts/youtube-toggle
bind = SUPER, K, exec, ~/.config/hypr/scripts/keybr-toggle.sh
bind = SUPER, W, exec, ~/.config/hypr/scripts/whatsapp-toggle.sh
bind = SUPER, J, exec, ~/.config/hypr/scripts/toggle-jellyfin.sh
bind = SUPER, U, exec, ~/.config/hypr/scripts/toggle-todo.sh
bind = SUPER, X, exec, ~/.config/hypr/scripts/toggle-x.sh


# Control tiling
bind = SUPER, Q, killactive,
bindd = SUPER CTRL, J, Toggle window split, togglesplit, # dwindle
bindd = SUPER CTRL, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bind = SUPER_CTRL, left, workspace, -1
bind = SUPER_CTRL, right, workspace, +1
bindd = SUPER, backslash, Toggle window floating/tiling, togglefloating,

# Special workspace toggles
bind = ALT, 1, togglespecialworkspace, special 1
bind = ALT, 2, togglespecialworkspace, special 2
bind = ALT, 3, togglespecialworkspace, special 3
bind = ALT, 4, togglespecialworkspace, special 4
bind = ALT, 5, togglespecialworkspace, special 5
bind = ALT, 6, togglespecialworkspace, special 6
bind = ALT, 7, togglespecialworkspace, special 7
bind = ALT, 8, togglespecialworkspace, special 8
bind = ALT, 9, togglespecialworkspace, special 9

# Special workspace moves
bind = ALT SHIFT, 1, movetoworkspacesilent, special:special 1
bind = ALT SHIFT, 2, movetoworkspacesilent, special:special 2
bind = ALT SHIFT, 3, movetoworkspacesilent, special:special 3
bind = ALT SHIFT, 4, movetoworkspacesilent, special:special 4
bind = ALT SHIFT, 5, movetoworkspacesilent, special:special 5
bind = ALT SHIFT, 6, movetoworkspacesilent, special:special 6
bind = ALT SHIFT, 7, movetoworkspacesilent, special:special 7
bind = ALT SHIFT, 8, movetoworkspacesilent, special:special 8
bind = ALT SHIFT, 9, movetoworkspacesilent, special:special 9


# TAB between workspaces
bindd = SUPER CTRL, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER, TAB, Former workspace, workspace, previous
bind = SUPER, Delete, exec, ~/.config/hypr/scripts/close_other_workspaces.sh


#Screen Capture
bind = , Print, exec, bash -c 'FILE=~/Pictures/Screenshots/fullscreen-$(date +%s).png; grim - | tee "$FILE" | wl-copy; ACTION=$(notify-send -A "default=Open" "Screenshot" "Fullscreen saved + copied"); [ "$ACTION" = "default" ] && satty -f "$FILE"'
bind = CTRL, Print, exec, bash -c 'FILE=~/Pictures/Screenshots/window-$(date +%s).png; AT=$(hyprctl activewindow | grep "at:" | awk "{print \$2}") && SIZE=$(hyprctl activewindow | grep "size:" | awk "{print \$2}" | sed "s/,/x/") && grim -g "${AT} ${SIZE}" - | tee "$FILE" | wl-copy; ACTION=$(notify-send -A "default=Open" "Screenshot" "Window saved + copied"); [ "$ACTION" = "default" ] && satty -f "$FILE"'
bind = SHIFT, Print, exec, bash -c 'FILE=~/Pictures/Screenshots/region-$(date +%s).png; grim -g "$(slurp)" - | tee "$FILE" | wl-copy; ACTION=$(notify-send -A "default=Open" "Screenshot" "Region saved + copied"); [ "$ACTION" = "default" ] && satty -f "$FILE"'
bind = SUPER SHIFT, Print, exec, ~/.local/bin/region-to-lens

bind = SUPER_CTRL, W, exec, killall waybar && waybar &
bind = SUPER CTRL, C, exec, omarchy-launch-tui /home/bubba/.local/bin/edit-hypr-config
bind = SUPER SHIFT, C, exec, omarchy-launch-tui /home/bubba/.local/bin/edit-hypr-defaults
bindd = SUPER SHIFT, K, Show key bindings, exec, omarchy-menu-keybindings
bind = SUPER SHIFT, W, exec, ~/.config/hypr/scripts/work-workflow.sh
bind = SUPER, period, exec, ~/.local/bin/emoji-picker
bind = SUPER, slash, exec, ~/.local/bin/snippet-picker
bind = SUPER, D, exec, ~/.config/hypr/toggle_dwindle.sh
bind = ALT, X, exec, ~/scripts/google-search-selected.sh
bind = SUPER SHIFT, M, exec, ~/.config/waybar/scripts/waybar-toggle.sh

# Lid switch handling - prevent screen blink on lid open
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on

bind = , grave, exec, ~/.config/hypr/scripts/backtick_handler.sh
bind = CTRL, grave, exec, wtype -M ctrl -P v -p v -m ctrl
bind = SHIFT, grave, exec, alacritty --class clipse -e clipse
bind = SUPER CTRL, V, exec, alacritty --class clipse -e clipse

# hyprwhspr - Toggle mode (added by hyprwhspr setup)
# Press once to start, press again to stop
bindd = SUPER ALT, D, Speech-to-text, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh record



