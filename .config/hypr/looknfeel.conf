# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
     gaps_in = 3
     gaps_out = 6
     border_size = 1

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
     rounding = 12
}

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
    default_split_ratio = 1.35
    force_split = 2
}

general {
    resize_on_border = true
    extend_border_grab_area = 50
    hover_icon_on_border = true
}

# Cursor theme and size
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18

animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

bezier = easeOutQuint,0.23,1,0.32,1
bezier = easeInOutCubic,0.65,0.05,0.36,1
bezier = linear,0,0,1,1
bezier = almostLinear,0.5,0.5,0.75,1.0
bezier = quick,0.15,0,0.1,1

animation = global, 1, 10, default
animation = border, 1, 3.5, easeOutQuint
animation = windows, 1, 3.5, easeOutQuint
animation = windowsIn, 1, 3, easeOutQuint, popin 87%
animation = windowsOut, 1, 1.2, linear, popin 87%
animation = fadeIn, 1, 1.3, almostLinear
animation = fadeOut, 1, 1, almostLinear
animation = fade, 1, 2, quick
animation = layers, 1, 3, easeOutQuint
animation = layersIn, 1, 3, easeOutQuint, fade
animation = layersOut, 1, 1.2, linear, fade
animation = fadeLayersIn, 1, 1.3, almostLinear
animation = fadeLayersOut, 1, 1, almostLinear
animation = workspaces, 1, 0.8, linear
animation = specialWorkspace, 1, 1.8, easeOutQuint, slidevert
}
